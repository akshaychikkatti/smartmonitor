<!DOCTYPE html>
<html>
<head>
  <title>Smart IoT Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🚀 Smart IoT Dashboard</h1>

<div class="container">

  <div class="card">
    ❤️ Heart Rate: <span id="heart">--</span>
  </div>

  <div class="card">
    🌡️ Temperature: <span id="temp">--</span>
  </div>

  <div class="card">
    🌫️ Air Quality: <span id="air">--</span>
  </div>

  <div class="card">
    💧 Water Level: <span id="water">--</span>
  </div>

</div>

<canvas id="chart"></canvas>

<!-- 🔗 Connection UI -->
<div class="connection-box">
  <button onclick="toggleConnection()" id="connectBtn">
    🔗 Connect Devices
  </button>

  <div id="connectionStatus" class="status-badge disconnected">
    ● Disconnected
  </div>
</div>

<h2 id="systemStatus">System Status: Loading...</h2>

<script src="script.js"></script>

</body>
</html>
