!DOCTYPE html>
<html>
<head>
  <title>Smart IoT Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="showDashboard()">📊</button>
  <button onclick="showAI()">🤖</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="main">

  <h1>🚀 Smart IoT Dashboard</h1>

  <div class="container">
    <div class="card">❤️ Heart: <span id="heart">--</span></div>
    <div class="card">🌡️ Temp: <span id="temp">--</span></div>
    <div class="card">🌫️ Air: <span id="air">--</span></div>
    <div class="card">💧 Water: <span id="water">--</span></div>
  </div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

  <button id="connectBtn" class="connect-btn">Connect</button>

  <h2 id="status">Status: --</h2>

</div>

<!-- AI PAGE -->
<div id="aiPage" class="main" style="display:none;">
  <h1>🤖 AI Assistant</h1>

  <div id="chatBox"></div>

  <input id="userInput" placeholder="Ask something..." />
  <button onclick="send()">Send</button>
</div>

<script src="script.js"></script>

</body>
</html>
