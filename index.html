<!DOCTYPE html>
<html>
<head>
  <title>Smart IoT Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🚀 Smart IoT Dashboard</h1>

<div class="container">

  <div class="card">
    ❤️ Heart Rate: <span id="heart">--</span>
  </div>

  <div class="card">
    🌡️ Temperature: <span id="temp">--</span>
  </div>

  <div class="card">
    🌫️ Air Quality: <span id="air">--</span>
  </div>

  <div class="card">
    💧 Water Level: <span id="water">--</span>
  </div>

</div>

<!-- GRAPH -->
<canvas id="chart"></canvas>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
